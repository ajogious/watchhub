name: watchhub
description: WatchHub - Premium Watch Shopping App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.0

  # Persistent Storage
  shared_preferences: ^2.0.0

  # Image caching
  cached_network_image: ^3.3.0

  # UI Components
  carousel_slider: ^5.1.2
  flutter_rating_bar: ^4.0.1

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # fonts:
  #   - family: YourFont
  #     fonts:
  #       - asset: assets/fonts/YourFont-Regular.ttf

flutter_launcher_icons:
  # Android
  android: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21

  # iOS
  ios: true
  image_path_ios: "assets/images/app_icon.png"

  # Windows / Web (optional but included for completeness)
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#0D0D0D"
    theme_color: "#DAA520"
