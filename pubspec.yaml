name: watchhub
description: WatchHub - Premium Watch Shopping App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.0

  # Persistent Storage
  shared_preferences: ^2.0.0

  # Image caching
  cached_network_image: ^3.3.0

  # UI Components
  carousel_slider: ^5.1.2
  flutter_rating_bar: ^4.0.1

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # fonts:
  #   - family: YourFont
  #     fonts:
  #       - asset: assets/fonts/YourFont-Regular.ttf
